databases:
  local_mysql:
    type: mysql
    host: ${MYSQL_HOST}
    port: ${MYSQL_PORT}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    database: ${MYSQL_DATABASE}
storage:
  local_fs:
    type: local
    options:
      root_dir: ./backups
backups:
  daily_mysql_full:
    database: local_mysql
    storage: local_fs
    backup_type: full
    compression: gzip
    encryption: fernet
    retention_count: 7
    retention_days: 30
notifications:
  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}
  email: null
logging:
  level: INFO
  file: ./backup_pilot.log
  json: false
